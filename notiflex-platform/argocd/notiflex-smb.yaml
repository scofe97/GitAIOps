apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: notiflex-smb
  namespace: argocd            # Application 리소스 자체는 argocd 네임스페이스에 산다
spec:
  project: default
  source:
    repoURL: https://github.com/scofe97/GitAIOps.git
    targetRevision: main
    path: notiflex-platform/k8s/smb   # repo 루트가 infra_ai(GitAIOps)이고 notiflex-platform은 하위 폴더 → 경로 한 단계 깊음
  destination:
    server: https://kubernetes.default.svc   # 클러스터 자기 자신(in-cluster)
    namespace: notiflex        # 배포 대상 네임스페이스
  syncPolicy:
    automated:                 # 깃이 바뀌면 자동 반영
      prune: true              # 깃에서 삭제한 것은 클러스터에서도 삭제
      selfHeal: true           # 누가 kubectl로 직접 수정해도 깃 상태로 복원
    syncOptions:
      - CreateNamespace=true   # notiflex 네임스페이스가 없으면 만들어라
