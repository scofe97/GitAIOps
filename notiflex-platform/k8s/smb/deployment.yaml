apiVersion: apps/v1
kind: Deployment
metadata:
  name: notiflex-api
  namespace: notiflex
  labels:
    app: notiflex-api
    tier: smb          # SMB(Small-Medium Business) 서비스 티어 — 6장에서 enterprise 티어가 추가된다
spec:
  replicas: 2          # 2개로 시작 — 무중단 배포(5장)·상태 공유(6장)를 체감하기 위한 최소 구성
  selector:
    matchLabels:
      app: notiflex-api
  template:
    metadata:
      labels:
        app: notiflex-api
        tier: smb
    spec:
      containers:
        - name: notiflex-api
          # 명시적 버전 태그(v0.1.0) — latest 금지(행동 규칙 7번). PROJECT_ID는 배포 시 실제 값으로 치환됨
          image: asia-northeast3-docker.pkg.dev/project-a99c4fa1-6c9e-4491-afd/notiflex/api:673f4df
          ports:
            - containerPort: 8080   # main.go의 ListenAndServe(":8080")와 일치
          # readiness: 트래픽 받을 준비가 됐는지 — 실패하면 Service 엔드포인트에서 제외
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 5
          # liveness: 살아있는지 — 실패가 지속되면 컨테이너 재시작
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          # 리소스 요청/제한 — Spot VM e2-medium(2 vCPU/4GB) 2노드 환경에 맞춘 소형 설정
          resources:
            requests:
              cpu: 50m
              memory: 32Mi
            limits:
              cpu: 200m
              memory: 128Mi
