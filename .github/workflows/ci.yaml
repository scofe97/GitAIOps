name: CI

on:
  push:
    branches: [main]
    paths: ['notiflex-platform/app/**']   # 앱 코드 변경만 트리거 (매니페스트 변경 제외 → 무한루프 1차 방어)

permissions:
  contents: write        # CI가 deployment.yaml을 커밋/푸시하려면 필요 (없으면 마지막 push가 403)
  id-token: write        # WIF: GitHub OIDC 토큰 발급에 필요 (키 대신 이걸로 GCP 인증)

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # 얕은 클론이면 CI 커밋 push가 거부될 수 있음

      # WIF 인증 — 키 파일 없이 GitHub OIDC 토큰을 GCP 임시 자격증명으로 교환
      - uses: google-github-actions/auth@v2
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}
          workload_identity_provider: projects/884125530666/locations/global/workloadIdentityPools/github-pool/providers/github-provider
          service_account: github-ci@project-a99c4fa1-6c9e-4491-afd.iam.gserviceaccount.com
      - uses: google-github-actions/setup-gcloud@v2
      - name: Configure Docker for AR
        run: gcloud auth configure-docker asia-northeast3-docker.pkg.dev --quiet

      - name: Build and Push
        id: build            # 아래 Step에서 outputs로 참조
        run: |
          IMAGE=asia-northeast3-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/notiflex/api
          TAG=$(echo $GITHUB_SHA | cut -c1-7)
          docker build -t $IMAGE:$TAG notiflex-platform/app/
          docker push $IMAGE:$TAG
          echo "image=$IMAGE:$TAG" >> $GITHUB_OUTPUT

      # ── CI가 매니페스트 태그를 갱신해 깃에 커밋 (배포는 ArgoCD가 이어받음) ──
      - name: Update manifest image tag
        run: |
          sed -i "s|image: .*notiflex/api:.*|image: ${{ steps.build.outputs.image }}|" \
            notiflex-platform/k8s/smb/deployment.yaml
      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
      - name: Commit and push manifest
        run: |
          git add notiflex-platform/k8s/smb/deployment.yaml
          git diff --cached --quiet && echo "no changes" && exit 0   # 같은 커밋 재빌드 시 nothing-to-commit 방지
          git commit -m "ci: update image tag to $(echo $GITHUB_SHA | cut -c1-7)"
          git push
